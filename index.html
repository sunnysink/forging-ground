type:`training`,title:`Transformation Is the Foundation of Everything You'll Build`,lead:`Your clients pay for transformation â€” the real, measurable shift in their life. Not the session experience. Not the modality. The change. Everything you build this week starts here, because transformation is what holds your entire method together.`,blocks:[{icon:`âš’`,heading:`It Shapes Your Methodology`,body:`Your modalities â€” reiki, astrology, human design, somatic work, whatever you practice â€” are your raw materials. Transformation gives them purpose. Instead of offering a list of separate services, transformation tells you how to organize those modalities into one cohesive method. Each modality gets a role in service of the shift your client needs.`},{icon:`âœ¦`,heading:`It Shapes Your Messaging`,body:`When you lead with transformation, people immediately understand what you do and why they need it. Without this foundation, your messaging becomes a list of credentials and certifications that only other practitioners understand. Transformation makes your words speak directly to the people who need your work.`},{icon:`â—ˆ`,heading:`It Shapes Your Practice`,body:`Without transformation as your compass, practice is just repetition â€” running sessions over and over without a clear measuring stick. With transformation as the foundation, every practice session has direction: Is my framework delivering this shift? Can I articulate it clearly? Am I building confidence in my ability to guide someone through it?`}]},{type:`blockquote`,title:`The Forge Metaphor`,quote:`Your modalities are the ore â€” raw materials pulled from the earth. Your method is the blade â€” what you forge from those materials. Your client doesn't need to know the metallurgy. They need to know the blade cuts.`,note:`This metaphor runs through everything we build this week. Ore becomes blade. Raw materials become method. The forge is where you do the work.`},{type:`card_grid`,title:`The Personal Trainer Anchor`,lead:`When the forge metaphor feels too abstract, come back to this one. It works the same way â€” just without the mysticism.`,connector:`Your client never picks these`,cards:[{icon:`ðŸ‹ï¸`,label:`Dumbbells`},{icon:`ðŸ”´`,label:`Resistance Bands`},{icon:`ðŸ§˜`,label:`Foam Roller`}],footer:`Nobody walks into a gym and buys these separately. They buy the body transformation, packaged as a program. The trainer decides which tools to use and when â€” the client never sees the selection process. Your modalities work exactly the same way. The client buys the shift. You decide which tools deliver it.`},{type:`comparison`,title:`Leading with Transformation`,lead:`Here's the difference in action. One approach lists your raw materials and asks the client to figure out why they matter. The other presents what they actually came for.`,wrong:{label:`Selling Ore`,text:`I'm a reiki master and certified astrologer who also does human design readings.`},right:{label:`Presenting the Blade`,text:`I help overwhelmed empaths stop absorbing everyone else's energy so they can finally trust their own intuition.`},note:`The first version is a rÃ©sumÃ©. The second is a reason to show up. Notice that the modalities don't disappear â€” they're still the tools you use. But the client doesn't need to evaluate your toolkit. They need to know you can create the shift they're looking for.`},{type:`standard`,title:`The Ore Mark`,body:`Below, you'll write down exactly how you describe what you do today. Not how you wish you said it â€” how you actually say it right now, if someone asked at a coffee shop. Save this. On Day 5, you'll come back to it, and the difference between then and now will be your proof that this process works.`},{type:`standard`,title:`Why We Track Confidence`,body:`Each day you'll rate your confidence on a 1â€“10 scale. This isn't a test â€” it's a mirror. Progress sometimes feels invisible in the moment, especially when you're deep in the work. The numbers show you your own shift in real time, even when it doesn't feel like anything is changing.`}],exercises:[{id:`ore_mark`,type:`textarea`,label:`THE ORE MARK âœ¦`,desc:`Write down how you currently describe what you do â€” exactly as you'd say it today if someone asked. Don't polish it. This is your raw starting point.`,placeholder:`When someone asks what I do, I usually say something like...`,rows:4,copyable:!0,copyLabel:`Copy Ore Mark`},{id:`declaration`,type:`textarea`,label:`YOUR DECLARATION`,desc:`Introduce yourself to the community. Who you are, what modalities you work with, and what you want to walk away with after these seven days.`,placeholder:`I'm [name], I work with [modalities], and by the end of this challenge I want to...`,rows:5,copyable:!0,copyLabel:`Copy Declaration`}]},{num:2,title:`The Ember`,tagline:`Before you touch the metal, know what the blade is for.`,tools:[],concepts:[{type:`training`,title:`Transformation Is the Shift in Your Client's Life`,lead:`This is the single most important concept in the entire challenge. Everything you build this week â€” your method, your messaging, your practice â€” starts here.`,blocks:[{icon:`âœ¦`,heading:`What It Is`,body:`The real, lasting change in your client's life because of the work you do together. Not the experience during the session. Not a feeling that fades by the next morning. It's the shift in how they move through their world after.`},{icon:`âœ•`,heading:`What It Isn't`,body:`"You'll feel relaxed after our session" is not a transformation â€” it's a session experience. Transformation is what's different in their life a week later, a month later. It's the before-and-after that matters, not just the during.`},{icon:`â—ˆ`,heading:`Why It Comes Before Everything Else`,body:`Without a clear transformation, your methodology has no compass and your messaging has no anchor. Practice without transformation as your measuring stick is just repetition. Nail this today, and the rest of the week builds on solid ground.`}]},{type:`card_grid`,title:`Session Transformation vs. Program Transformation`,lead:`You'll focus on one of these for the next seven days. The framework applies to either â€” you can always run the challenge again for the other.`,connector:`Pick one and go deep`,cards:[{icon:`âš¡`,label:`Session`},{icon:`ðŸ”„`,label:`Program`}],footer:`A session transformation is what shifts in a single sitting. A program transformation is the larger arc across multiple sessions. Working both at once dilutes your clarity â€” pick one and go deep.`},{type:`training`,title:`Describing the Before State and After State`,lead:`The shift needs to be in language anyone could understand â€” even someone completely outside your industry. What does your client walk in carrying? What do they walk out holding instead?`,blocks:[{icon:`âš’`,heading:`The Language Test`,body:`If the words only make sense to other practitioners, they won't land with the people who need your work most. Test it: could your non-spiritual friend understand what you're saying?`},{icon:`âœ¦`,heading:`No Clients Yet? Use Your Own Transformation`,body:`How have you shifted through these modalities? What changed in your life? That lived experience is your starting material â€” it's honest, specific, and yours. This is a perfectly valid starting point.`}]},{type:`blockquote`,title:`Permission to Draft`,quote:`This is version one of something that will keep refining. You might throw it away and pick a completely new transformation by Day 5. That's the process working, not a failure.`,note:`First drafts are supposed to be rough. You're not carving anything in stone today â€” you're shaping clay.`},{type:`training`,title:`The Two Statements You're Building Today`,lead:`Today you'll write two versions of your transformation. Both matter. The spark gets attention. The full statement earns trust.`,blocks:[{icon:`âš¡`,heading:`Your "What Do You Do" Draft`,body:`Today you're drafting how you'd describe what you do â€” casually, in your own words. This isn't the final version. On Day 5 you'll work with AI to refine this into a polished spark statement. Right now, just get the raw idea out.`},{icon:`â—ˆ`,heading:`Brainstorming the Transformation`,body:`You'll walk through three movements: where your client starts, what shifts, and where they land. Think of it as three snapshots. You don't need perfect language â€” you need honest language. The refinement comes later.`}]},{type:`standard`,title:`Say It Out Loud`,body:`Speaking your statements out loud reveals whether the words feel true in your body or just look right on paper. This step matters â€” don't skip it.`,tips:[`Say it to yourself first â€” in a mirror or voice memo`,`Then say it to someone who knows nothing about your work`,`If you stumble or it feels forced, that's the revision signal`,`Record yourself â€” listening back reveals what writing can't`]}],exercises:[{id:`transformation_type`,type:`select`,label:`YOUR FOCUS`,desc:`Which are you building for these seven days?`,options:[`Session Transformation`,`Program Transformation`]},{id:`what_you_do_draft`,type:`textarea`,label:`YOUR "WHAT DO YOU DO" DRAFT`,desc:`If someone asked you what you do and why it matters â€” what would you say? Don't overthink it. Just get the words out. You'll refine this into a proper spark statement on Day 5.`,placeholder:`When someone asks what I do, I'd say something like...`,rows:3,copyable:!0,copyLabel:`Copy Draft`},{id:`transformation_before`,type:`textarea`,label:`TRANSFORMATION BRAINSTORM â€” BEFORE`,desc:`What does your client walk in carrying? What are they stuck on, cycling through, or unable to see clearly?`,placeholder:`Before working with me, my clients are usually...`,rows:3},{id:`transformation_shift`,type:`textarea`,label:`TRANSFORMATION BRAINSTORM â€” THE SHIFT`,desc:`What changes through your work together? What opens, releases, or becomes visible?`,placeholder:`Through our work together, what shifts is...`,rows:3},{id:`transformation_after`,type:`textarea`,label:`TRANSFORMATION BRAINSTORM â€” AFTER`,desc:`Where do they land? How does their life look and feel different on the other side?`,placeholder:`They walk away with...`,rows:3,copyable:!0,copyLabel:`Copy Transformation Brainstorm`},{id:`said_out_loud`,type:`checkbox`,label:`I said both statements out loud at least three times`,desc:`Did they feel true? If not, revise above until they do.`}]},{num:3,title:`The Raw Materials`,tagline:`Now that you know what the blade is for, inventory your ore.`,tools:[{name:`Modality Clarity Guide`,url:`https://sunnysink.github.io/modalityclarity/`,note:`Open this alongside your workbook and work through the sections there.`}],concepts:[{type:`training`,title:`One Question for Every Modality`,lead:`Now that you've named the transformation, look at your tools differently. Every modality gets evaluated through one question: how does this serve the transformation?`,blocks:[{icon:`âš’`,heading:`Give Each Modality a Role`,body:`Some carry the session. Some deepen a moment. Some are there for specific clients or situations. Giving each modality a clear job prevents the "everything buffet" problem where the client can't tell what you actually do.`},{icon:`âœ•`,heading:`If It Doesn't Connect, It Doesn't Belong â€” Yet`,body:`If you can't draw a clear line from a modality to the shift your client needs, it doesn't belong in this method right now. That doesn't mean it's not valuable â€” it means it's not part of this particular blade.`}]},{type:`comparison`,mode:`parallel`,title:`Lead vs. Support Modalities`,lead:`Think of a band: one instrument carries the melody, the others make it richer. Your modalities work the same way.`,wrong:{label:`Lead Modality`,text:`Drives the core experience of the session. The primary tool doing the heavy lifting of the transformation.`},right:{label:`Support Modalities`,text:`Deepen, customize, or extend what the lead opens. They enrich the work without competing for the spotlight.`},note:`Be honest about which modalities you're genuinely strongest in versus which ones you default to out of comfort. These aren't always the same. The modality you reach for first might not be the one that serves the transformation best.`},{type:`blockquote`,title:`The Practice Touch`,quote:`When you can explain how a modality serves the transformation without naming the modality first, you've internalized the core principle from Day 1.`,note:`Lead with what it does, not what it's called. That's the shift.`}],exercises:[{id:`modality_map`,type:`modality_map`,label:`YOUR MODALITY MAP`,desc:`Add each modality you work with, assign its role, and describe how it serves the transformation.`,copyable:!0,copyLabel:`Copy Modality Map`},{id:`practice_touch`,type:`textarea`,label:`PRACTICE TOUCH`,desc:`Pick one of your modalities. Explain how it serves the transformation without naming it first. Lead with what it does, not what it's called.`,placeholder:`In our work together, there's a moment where [describe what happens and why it matters]...`,rows:5,copyable:!0,copyLabel:`Copy Practice Touch`}]},{num:4,title:`The Forge`,tagline:`Shape the ore into one blade.`,tools:[],concepts:[{type:`blockquote`,title:`The Core Principle`,quote:`Splitting your modalities into separate offers â€” reiki sessions here, astrology readings there, coaching packages somewhere else â€” fragments your value and confuses your client.`,note:`Today you're shaping everything into one cohesive experience where the modalities work together seamlessly. Not a menu. One blade.`},{type:`standard`,title:`The Intake Form Framework`,body:`An intake form captures what the client needs so you can deploy the right modality combination for them. It's not a one-size-fits-all session, and it's not a menu they choose from. You're the practitioner â€” intake informs your decisions.`,tips:[`Keep it short â€” 3 to 5 questions maximum`,`Ask about their desired outcome, not their diagnosis`,`Include one question about what they've already tried`,`The intake informs your modality decisions, not theirs`]},{type:`training`,title:`Session Architecture: Beginning, Middle, and End`,lead:`Every session has three phases, and each one has a job. How your modalities slot into this flow comes from the modality map you built on Day 3.`,blocks:[{icon:`â–¸`,heading:`The Opening`,body:`Creates the container. This is where you ground the client, set the tone, and establish trust. Which modality (if any) opens the space?`},{icon:`â—†`,heading:`The Core Work`,body:`Delivers the transformation. Your lead modality does the heavy lifting here. Support modalities deepen or customize based on what the client needs â€” informed by your intake.`},{icon:`â—‚`,heading:`The Close`,body:`Integrates what happened. The client needs to land, not just stop. What do they take with them â€” a practice, an insight, a next step?`}]},{type:`standard`,title:`Forge Partners`,body:`A Forge Partner is someone in the community you pair with to practice your session flow, exchange feedback, and pressure-test your framework. Hearing yourself explain it out loud reveals gaps that writing hides.`,tips:[`Walk through your session flow together â€” you explain, they listen and respond`,`Focus feedback on what landed clearly and what felt unclear`,`You're not performing â€” you're practicing. Keep it low-pressure.`]}],exercises:[{id:`intake_questions`,type:`textarea`,label:`INTAKE THINKING`,desc:`What would you want to know about a new client before designing their session? What helps you decide which modalities to use?`,placeholder:`I'd want to know...`,rows:5,prompt:{title:`Intake question starters`,content:`Think about what you need to learn, not what you need to teach:

â€¢ What brought them to you right now? (Why this moment?)
â€¢ What have they already tried? (What hasn't worked?)

â€¢ Is there anything they want to make sure is or isn't part of the session?
â€¢ What does their body, energy, or emotional state need most right now?

Your intake doesn't need to be long. It needs to give you what you need to make good decisions.`}},{id:`session_framework`,type:`textarea`,label:`YOUR SESSION FRAMEWORK`,desc:`Map your session flow: what happens in the opening, the core work, and the close. Show how your modalities work together.`,placeholder:`OPENING:

le:`The Day 1 Mirror`,body:`Below you'll see what you wrote on Day 1 â€” your Ore Mark. Read it, then look at what you can say now. The gap between those two versions is your proof that this process is working.`},{type:`standard`,title:`Giving Good Feedback`,body:`When you share your work today, you'll also give and receive community feedback. "This is great!" is kind but not useful.`,tips:[`Name one thing that landed clearly`,`Name one thing that felt unclear or raised a question`,`Suggest one specific thing to try differently`]}],exercises:[{id:`method_name`,type:`text`,label:`YOUR METHOD NAME`,desc:`What is your method called?`,placeholder:`The [Name] Method / [Name] / etc.`},{id:`method_statement`,type:`textarea`,label:`YOUR METHOD STATEMENT`,desc:`How you describe what your method does and who it's for. This comes from your work in the Method to Message Generator.`,placeholder:`Write your method statement here...`,rows:5,copyable:!0,copyLabel:`Copy Method Statement`},{id:`mirror`,type:`mirror`,label:`THE DAY 1 MIRROR âœ¦`,desc:`Compare your Ore Mark from Day 1 with how you'd describe your work now.`,sourceField:`ore_mark`,sourceDay:1},{id:`current_description`,type:`textarea`,label:`HOW YOU'D SAY IT NOW`,desc:`After five days in the forge, how do you describe what you do? Write it fresh.`,placeholder:`Now when someone asks what I do, I say...`,rows:4},{id:`bio_rewrite`,type:`textarea`,label:`BIO REWRITE`,desc:`Rewrite your Instagram bio or "about" section using your new language.`,placeholder:`New bio copy...`,rows:4,copyable:!0,copyLabel:`Copy Bio`},{id:`feedback_post`,type:`compiled`,label:`FEEDBACK POST`,desc:`Your pieces compiled for community feedback. Review and copy.`,sources:[{dayNum:2,fieldId:`what_you_do_draft`,label:`"What Do You Do" Draft`},{dayNum:2,fieldId:`transformation_before`,label:`Transformation â€” Before`},{dayNum:2,fieldId:`transformation_shift`,label:`Transformation â€” The Shift`},{dayNum:2,fieldId:`transformation_after`,label:`Transformation â€” After`},{dayNum:5,fieldId:`method_name`,label:`Method Name`}],copyLabel:`Copy Feedback Post`}]},{num:6,title:`The Crucible`,tagline:`Put the blade in someone's hands.`,tools:[{name:`Maker's Mark â€” Canva Template`,url:`https://canva.link/6yceryy1ci63pu1`,note:`Open this template to create your North Star banner.`}],concepts:[{type:`blockquote`,title:`The Convergence`,quote:`Transformation + methodology + messaging come together in one signature session description. This is what all five days have been building toward.`,note:`This is no longer an exercise. What you write today is something you could put on a sales page, say in a discovery call, or send to someone who asks what you do. Treat it that way.`},{type:`training`,title:`The Five Parts of a Signature Session Description`,lead:`Each component does a specific job. Together, they give someone everything they need to say yes.`,blocks:[{icon:`â‘ `,heading:`Your Session Name`,body:`What you call it. This is the method name in action â€” the branded experience someone signs up for.`},{icon:`â‘¡`,heading:`Who It's For`,body:`Your ideal client, where they are right now. Not everyone â€” the specific person who needs this specific shift.`},{icon:`â‘¢`,heading:`The Transformation It Delivers`,body:`The shift they experience. This connects directly to the transformation statement you wrote on Day 2.`},{icon:`â‘£`,heading:`What the Client Experiences`,body:`The journey from their perspective. What does the session feel like? What will they notice? Walk them through it.`},{icon:`â‘¤`,heading:`How It Works`,body:`Practical details â€” length, format, what to expect. This is where logistics live so the rest can stay transformational.`}]},{type:`standard`,title:`The Maker's Mark âœ¦`,body:`Your North Star banner â€” a Canva template with your name, method name, your photo, and who you help. This is a visual anchor you come back to before creating content, before hopping on a call, before making any offer. It's your personal compass.`},{type:`standard`,title:`Why Peer Review Matters Now`,body:`Fresh eyes catch blind spots, especially in offer language where you're too close to your own work.`,tips:[`Does the transformation come through clearly?`,`Would you understand the session if you knew nothing else about this person?`,`What question would a potential client still have?`,`Is any part confusing or too vague?`]}],exercises:[{id:`session_name`,type:`text`,label:`SESSION NAME`,desc:`What is your signature session called?`,placeholder:`The [Name] Session`},{id:`who_its_for`,type:`textarea`,label:`WHO IT'S FOR`,desc:`Your ideal client for this session â€” who needs this, where they are right now.`,placeholder:`This session is for...`,rows:3},{id:`session_transformation`,type:`textarea`,label:`THE TRANSFORMATION IT DELIVERS`,desc:`What shifts for the client? Connect this to the transformation statement you wrote on Day 2.`,placeholder:`Through this session, clients experience...`,rows:3},{id:`session_experience`,type:`textarea`,label:`WHAT THE CLIENT EXPERIENCES`,desc:`Walk through the journey â€” what does the session feel like from the client's perspective?`,placeholder:`In this session, you'll...`,rows:4},{id:`how_it_works`,type:`textarea`,label:`HOW IT WORKS`,desc:`Practical details â€” length, format, what to expect.`,placeholder:`Sessions are [length], delivered [format]. Before we begin...`,rows:3},{id:`full_description`,type:`textarea`,label:`FULL SIGNATURE SESSION DESCRIPTION`,desc:`Put it all together. This is the version you'd share publicly.`,placeholder:`Combine everything above into your complete signature session description...`,rows:10,copyable:!0,copyLabel:`Copy Signature Session Description`},{id:`peer_feedback_given`,type:`checkbox`,label:`I gave one other person specific, honest feedback on their signature session description`}]},{num:7,title:`The Tempering`,tagline:`The process that makes the blade hold its edge.`,tools:[],concepts:[{type:`blockquote`,title: ing in the flow doesn't work the way you mapped it. A modality doesn't slot in where you thought it would. Practice shows you where the design needs adjustment.`},{icon:`â—ˆ`,heading:`Sharpens Your Messaging`,body:`You find better words through repetition. The way you describe your work evolves from clunky to clear to compelling â€” but only if you keep saying it.`}]},{type:`standard`,title:`The Daily Loom Insight`,body:`Each day during the integration period, record a short voice or video note capturing what you noticed during practice. This is how you track your own evolution in real time.`,tips:[`Keep it under 3 minutes`,`Talk about what you noticed, what shifted, what question came up`,`Record right after practice while the insight is fresh`,`These feed your weekly reflection â€” don't overthink them`]},{type:`standard`,title:`Your 21-Day Commitment`,body:`Be specific. Not "I'll keep going" â€” that fades by day four. Name what you'll practice, how often, what you'll refine, and which practice bucket you're starting with. A structured plan holds.`}],exercises:[{id:`starting_bucket`,type:`select`,label:`STARTING PRACTICE BUCKET`,desc:`Which bucket are you starting with?`,options:[`Does the framework feel right?`,`Is it delivering the transformation?`,`Building confidence through repetition`]},{id:`practice_plan`,type:`textarea`,label:`YOUR 21-DAY PRACTICE PLAN`,desc:`What will you practice? How often? What will you refine? Be specific.`,placeholder:`For the next 21 days, I commit to:

        :root{--bg:#0d1411;--bg2:#101a16;--bg3:#0a100d;--ink:#F1E7D6;--ink-dim:#BDB09A;--ink-faint:#8C8270;--copper:#C6955C;--copper-lt:#E2B884;--copper-dk:#9A6F3E;--ember:#E8743B;--ember-glow:#FF8A4C;--forest:#2C5F5A;--forest-lt:#4FA89B;--mauve:#9B7C8B;--mauve-lt:#C0A2B0;--gold:#D8B968;--surface:rgba(22,34,28,0.72);--surface-2:rgba(241,231,214,0.045);--surface-3:rgba(241,231,214,0.025);--line:rgba(198,149,92,0.20);--line-2:rgba(241,231,214,0.10);--shadow:0 10px 36px rgba(0,0,0,0.45);--serif:'Cormorant Garamond',Georgia,serif;--sans:'Hanken Grotesk',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--radius:16px;--radius-sm:11px;--radius-xs:8px}

        .fg-root{display:flex;min-height:100vh;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;position:relative;overflow:hidden}
        .fg-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 120% 90% at 50% -10%,#16241d 0%,#0d1411 50%,#080d0b 100%)}
        .fg-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 18% 12%,rgba(232,116,59,0.12) 0%,transparent 55%),radial-gradient(ellipse 50% 55% at 85% 22%,rgba(198,149,92,0.10) 0%,transparent 52%),radial-gradient(ellipse 55% 50% at 72% 88%,rgba(44,95,90,0.22) 0%,transparent 55%)}
        
        /* â”€â”€ Sidebar â”€â”€ */
        .fg-sidebar{width:260px;min-width:260px;background:rgba(13,20,17,0.92);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-right:1px solid var(--line);display:flex;flex-direction:column;position:relative;z-index:20;padding:28px 0 20px}
        .fg-sidebar-title{font-family:var(--serif);font-size:1.5em;font-weight:700;padding:0 24px 6px;background:linear-gradient(100deg,var(--copper-lt) 0%,var(--ember-glow) 40%,var(--gold) 70%,var(--copper) 100%);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 18px rgba(232,116,59,0.25));animation:shimmer 8s ease-in-out infinite alternate}
        .fg-sidebar-sub{font-family:var(--mono);font-size:0.6em;font-weight:500;color:var(--ink-faint);text-transform:uppercase;letter-spacing:3px;padding:0 24px;margin-bottom:28px}
        @keyframes shimmer{0%{background-position:0% 50%}100%{background-position:100% 50%}}
        .fg-nav{flex:1;display:flex;flex-direction:column;gap:2px;padding:0 12px}
        .fg-nav-btn{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--radius-sm);border:1px solid transparent;background:transparent;cursor:pointer;transition:all .22s;text-align:left;width:100%;font-family:var(--sans);color:var(--ink-dim)}
        .fg-nav-btn:hover{background:var(--surface-2);border-color:var(--line-2);color:var(--ink)}
        .fg-nav-btn.active{background:rgba(198,149,92,0.10);border-color:var(--line);color:var(--copper-lt)}
        .fg-nav-num{font-family:var(--mono);font-size:0.68em;font-weight:700;color:var(--ink-faint);min-width:20px;text-align:center;letter-spacing:1px}
        .fg-nav-btn.active .fg-nav-num{color:var(--copper)}
        .fg-nav-label{font-size:0.88em;font-weight:500}
        .fg-nav-dot{width:6px;height:6px;border-radius:50%;background:var(--forest);margin-left:auto;flex-shrink:0;opacity:0;transition:opacity .22s}
        .fg-nav-dot.has-data{opacity:1}

        /* â”€â”€ Main â”€â”€ */
        .fg-main{flex:1;overflow-y:auto;position:relative;z-index:10;padding:36px 40px 40px;scrollbar-width:thin;scrollbar-color:var(--copper-dk) transparent}
        .fg-main::-webkit-scrollbar{width:6px}
        .fg-main::-webkit-scrollbar-track{background:transparent}
        .fg-main::-webkit-scrollbar-thumb{background:var(--copper-dk);border-radius:3px}
        .fg-content{max-width:780px;margin:0 auto}

        /* â”€â”€ Day Header â”€â”€ */
        .fg-day-kicker{font-family:var(--mono);font-size:0.66em;font-weight:600;color:var(--copper);text-transform:uppercase;letter-spacing:4px;margin-bottom:8px}
        .fg-day-title{font-family:var(--serif);font-size:2.4em;font-weight:700;color:var(--ink);margin-bottom:8px;line-height:1.15}
        .fg-day-tagline{font-size:1.05em;color:var(--ink-dim);font-weight:300;font-style:italic;line-height:1.5;margin-bottom:36px}

        /* â”€â”€ Section Headings â”€â”€ */
        .fg-section-heading{font-family:var(--serif);font-size:1.45em;font-weight:700;color:var(--ink);margin:40px 0 20px;display:flex;align-items:center;gap:14px}
        .fg-section-heading::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}

        /* â”€â”€ Concepts (lighter layout) â”€â”€ */
        .fg-concepts-wrap{margin-bottom:10px}
        .fg-concept{padding:0 0 20px 16px;margin-bottom:20px;border-left:2px solid var(--line-2);position:relative}
        .fg-concept:last-child{margin-bottom:0;padding-bottom:0}
        .fg-concept::before{content:'âœ¦';position:absolute;left:-7px;top:-2px;font-size:0.7em;color:var(--copper);background:var(--bg);padding:2px 0}
        .fg-concept-title{font-family:var(--serif);font-size:1.1em;font-weight:700;color:var(--copper-lt);margin-bottom:5px}
        .fg-concept-body{font-size:0.88em;color:var(--ink-dim);line-height:1.65;font-weight:300}
        .fg-concept-tips{margin-top:10px;display:flex;flex-direction:column;gap:6px}
        .fg-tip{font-size:0.84em;color:var(--ink-dim);line-height:1.55;font-weight:300;padding-left:18px;position:relative}
        .fg-tip::before{content:'â—‡';position:absolute;left:0;color:var(--copper);font-size:0.8em}

        /* â”€â”€ Tool Links â”€â”€ */
        .fg-tool-card{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:var(--radius-sm);background:rgba(44,95,90,0.10);border:1px solid rgba(79,168,155,0.22);margin-bottom:12px;transition:all .22s}
        .fg-tool-card:hover{border-color:rgba(79,168,155,0.40);background:rgba(44,95,90,0.16)}
        .fg-tool-icon{font-size:1.2em;flex-shrink:0}
        .fg-tool-info{flex:1;min-width:0}
        .fg-tool-name{font-family:var(--sans);font-size:0.88em;font-weight:600;color:var(--forest-lt)}
        .fg-tool-note{font-size:0.78em;color:var(--ink-faint);font-weight:300;margin-top:2px}
        .fg-tool-link{padding:7px 16px;border-radius:30px;background:transparent;border:1px solid rgba(79,168,155,0.30);color:var(--forest-lt);font-family:var(--sans);font-size:0.74em;font-weight:600;cursor:pointer;transition:all .22s;text-decoration:none;white-space:nowrap}
        .fg-tool-link:hover{background:rgba(79,168,155,0.14);border-color:var(--forest-lt)}

        /* â”€â”€ Exercise Fields â”€â”€ */
        .fg-field{margin-bottom:24px}
        .fg-field-label{font-family:var(--mono);font-size:0.68em;font-weight:600;color:var(--copper);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px}
        .fg-field-desc{font-size:0.84em;color:var(--ink-dim);line-height:1.55;margin-bottom:10px;font-weight:300}
        .fg-textarea,.fg-input{width:100%;padding:12px 14px;border:1px solid var(--line-2);border-radius:var(--radius-sm);font-family:var(--sans);font-size:0.92em;color:var(--ink);background:var(--surface-2);outline:none;transition:border-color .2s,box-shadow .2s,background .2s;line-height:1.6;resize:vertical}
        .fg-textarea:focus,.fg-input:focus{border-color:var(--copper);box-shadow:0 0 0 3px rgba(198,149,92,0.15),0 0 20px rgba(198,149,92,0.2);background:rgba(241,231,214,0.06)}
        .fg-textarea::placeholder,.fg-input::placeholder{color:var(--ink-faint);font-weight:300}

        /* â”€â”€ Copy Button â”€â”€ */
        .fg-copy-row{display:flex;justify-content:flex-end;margin-top:8px}
        .fg-copy-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:30px;background:transparent;border:1px solid var(--line);color:var(--ink-dim);font-family:var(--sans);font-size:0.74em;font-weight:600;cursor:pointer;transition:all .22s;letter-spacing:0.3px}
        .fg-copy-btn:hover{border-color:var(--copper);color:var(--copper-lt);background:rgba(198,149,92,0.08)}

        /* â”€â”€ Select â”€â”€ */
        .fg-select-group{display:flex;gap:10px;flex-wrap:wrap}
        .fg-select-opt{padding:10px 18px;border-radius:30px;border:1px solid var(--line-2);background:var(--surface-2);color:var(--ink-dim);font-family:var(--sans);font-size:0.85em;font-weight:500;cursor:pointer;transition:all .22s}
        .fg-select-opt:hover{border-color:var(--copper);color:var(--copper-lt)}
        .fg-select-opt.selected{background:linear-gradient(135deg,var(--copper-dk),var(--copper));color:#1a120a;border-color:transparent;font-weight:700;box-shadow:0 4px 14px rgba(198,149,92,0.3)}

        /* â”€â”€ Checkbox â”€â”€ */
        .fg-check-row{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:var(--radius-sm);background:var(--surface-2);border:1px solid var(--line-2);cursor:pointer;transition:all .22s}
        .fg-check-row:hover{border-color:var(--line)}
        .fg-check-box{width:22px;height:22px;min-width:22px;border-radius:6px;border:2px solid var(--copper-dk);background:transparent;display:flex;align-items:center;justify-content:center;transition:all .22s;margin-top:1px}
        .fg-check-box.checked{background:linear-gradient(135deg,var(--copper),var(--ember));border-color:transparent}
        .fg-check-label{font-size:0.88em;color:var(--ink-dim);line-height:1.5;font-weight:400}

        /* â”€â”€ Prompt Expander â”€â”€ */
        .fg-prompt-toggle{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:30px;margin-bottom:10px;background:rgba(44,95,90,0.12);border:1px solid rgba(79,168,155,0.22);color:var(--forest-lt);font-family:var(--sans);font-size:0.76em;font-weight:600;cursor:pointer;transition:all .22s}
        .fg-prompt-toggle:hover{background:rgba(44,95,90,0.20);border-color:rgba(79,168,155,0.35)}
        .fg-prompt-content{background:rgba(44,95,90,0.10);border:1px solid rgba(79,168,155,0.18);border-radius:var(--radius-sm);padding:16px 20px;margin-bottom:12px;font-size:0.84em;color:var(--ink-dim);line-height:1.65;font-weight:300;white-space:pre-line}

        /* â”€â”€ Mirror â”€â”€ */
        .fg-mirror-card{background:rgba(232,116,59,0.06);border:1px solid rgba(232,116,59,0.18);border-radius:var(--radius);padding:20px 22px;margin-bottom:14px}
        .fg-mirror-label{font-family:var(--mono);font-size:0.62em;font-weight:600;color:var(--ember);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
        .fg-mirror-text{font-size:0.9em;color:var(--ink-dim);line-height:1.6;font-style:italic;font-weight:300}
        .fg-mirror-empty{font-size:0.84em;color:var(--ink-faint);font-style:italic}

        /* â”€â”€ Compiled Field â”€â”€ */
        .fg-compiled-card{background:var(--surface);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;position:relative;overflow:hidden}
        .fg-compiled-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--gold),var(--copper),var(--ember))}
        .fg-compiled-section{margin-bottom:14px}
        .fg-compiled-section:last-child{margin-bottom:0}
        .fg-compiled-sublabel{font-family:var(--mono);font-size:0.6em;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px}
        .fg-compiled-text{font-size:0.88em;color:var(--ink-dim);line-height:1.6;font-weight:300;white-space:pre-wrap}
        .fg-compiled-empty{font-size:0.84em;color:var(--ink-faint);font-style:italic}

        /* â”€â”€ Modality Map â”€â”€ */
        .fg-mod-entry{background:var(--surface-2);border:1px solid var(--line-2);border-radius:var(--radius-sm);padding:16px;margin-bottom:10px;display:flex;flex-direction:column;gap:10px}
        .fg-mod-row{display:flex;gap:10px;align-items:center}
        .fg-mod-input{flex:1;padding:9px 12px;border:1px solid var(--line-2);border-radius:var(--radius-xs);font-family:var(--sans);font-size:0.88em;color:var(--ink);background:var(--surface-3);outline:none;transition:border-color .2s,box-shadow .2s}
        .fg-mod-input:focus{border-color:var(--copper);box-shadow:0 0 0 2px rgba(198,149,92,0.12)}
        .fg-mod-input::placeholder{color:var(--ink-faint)}
        .fg-mod-role-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--line-2);background:transparent;color:var(--ink-faint);font-family:var(--sans);font-size:0.74em;font-weight:600;cursor:pointer;transition:all .22s;text-transform:uppercase;letter-spacing:0.5px}
        .fg-mod-role-btn:hover{border-color:var(--copper);color:var(--copper-lt)}
        .fg-mod-role-btn.active-lead{background:linear-gradient(135deg,var(--copper-dk),var(--copper));color:#1a120a;border-color:transparent}
        .fg-mod-role-btn.active-support{background:rgba(198,149,92,0.15);color:var(--copper-lt);border-color:var(--copper)}
        .fg-mod-remove{padding:4px 10px;border-radius:20px;border:1px solid var(--line-2);background:transparent;color:var(--ink-faint);font-size:0.72em;cursor:pointer;transition:all .22s;font-family:var(--sans)}
        .fg-mod-remove:hover{border-color:var(--ember);color:var(--ember)}
        .fg-add-mod{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:30px;background:transparent;border:1px dashed var(--line);color:var(--ink-dim);font-family:var(--sans);font-size:0.82em;font-weight:500;cursor:pointer;transition:all .22s}
        .fg-add-mod:hover{border-color:var(--copper);color:var(--copper-lt);border-style:solid}

        /* â”€â”€ Confidence â”€â”€ */
        .fg-confidence{margin-top:40px;padding-top:28px;border-top:1px solid var(--line-2)}
        .fg-confidence-label{font-family:var(--serif);font-size:1.15em;font-weight:700;color:var(--ink);margin-bottom:6px}
        .fg-confidence-desc{font-size:0.82em;color:var(--ink-dim);margin-bottom:14px;font-weight:300}
        .fg-confidence-row{display:flex;gap:6px;flex-wrap:wrap}
        .fg-conf-btn{width:48px;height:48px;border-radius:12px;border:1px solid var(--line-2);background:var(--surface-2);color:var(--ink-dim);font-family:var(--mono);font-size:1em;font-weight:700;cursor:pointer;transition:all .22s;display:flex;align-items:center;justify-content:center}
        .fg-conf-btn:hover{border-color:var(--copper);color:var(--copper-lt);transform:translateY(-1px)}
        .fg-conf-btn.selected{background:linear-gradient(135deg,var(--copper-dk),var(--copper));color:#1a120a;border-color:transparent;box-shadow:0 4px 14px rgba(198,149,92,0.35)}
        .fg-conf-history{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 8px}
        .fg-conf-chip{display:flex;flex-direction:column;align-items:center;padding:8px 10px;border-radius:var(--radius-xs);background:var(--surface-2);border:1px solid var(--line-2);min-width:54px}
        .fg-conf-chip-day{font-family:var(--mono);font-size:0.56em;font-weight:600;color:var(--ink-faint);text-transform:uppercase;letter-spacing:1px}
        .fg-conf-chip-val{font-family:var(--mono);font-size:1.2em;font-weight:700;color:var(--copper-lt)}
        .fg-conf-chip-empty{color:var(--ink-faint);font-size:0.9em}

        /* â”€â”€ What's Next â”€â”€ */
        .fg-whats-next{margin-top:40px;padding:28px 26px;background:var(--surface);backdrop-filter:blur(16px);border:1px solid var(--line);border-radius:var(--radius);position:relative;overflow:hidden}
        .fg-whats-next::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--gold),var(--copper))}
        .fg-whats-next h3{font-family:var(--serif);font-size:1.35em;font-weight:700;color:var(--ink);margin-bottom:8px}
        .fg-whats-next p{font-size:0.88em;color:var(--ink-dim);line-height:1.65;font-weight:300;margin-bottom:16px}
        .fg-whats-next a{text-decoration:none;transition:all .22s}

        /* â”€â”€ Footer â”€â”€ */
        .fg-footer{margin-top:48px;padding:24px 0;border-top:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
        .fg-footer-text{font-size:0.78em;color:var(--ink-faint);font-weight:300}
        .fg-footer a{color:var(--copper);text-decoration:none;font-weight:500;transition:color .22s;font-size:0.82em}
        .fg-footer a:hover{color:var(--copper-lt)}

        /* â”€â”€ Day Nav â”€â”€ */
        .fg-day-nav{display:flex;justify-content:space-between;margin-top:32px;padding-top:20px;border-top:1px solid var(--line-2)}

        /* â”€â”€ Toast â”€â”€ */
        .fg-toast{position:fixed;bottom:24px;left:50%;z-index:9999;transform:translateX(-50%);padding:11px 24px;background:rgba(15,23,19,0.96);border:1px solid var(--copper);color:var(--copper-lt);border-radius:30px;font-size:0.85em;font-weight:600;font-family:var(--sans);box-shadow:var(--shadow);pointer-events:none;animation:toastIn .3s ease}
        @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}


        /* â”€â”€ Hero Image â”€â”€ */
        .fg-hero-image{width:100%;border-radius:var(--radius);overflow:hidden;margin-bottom:32px;box-shadow:0 8px 32px rgba(0,0,0,0.5),0 2px 8px rgba(0,0,0,0.3);border:1px solid var(--line-2)}
        .fg-hero-image img{width:100%;height:auto;display:block}

        /* â”€â”€ Training Section â”€â”€ */
        .fg-training{margin-bottom:32px}
        .fg-training-title{font-family:var(--serif);font-size:1.4em;font-weight:700;color:var(--ink);margin-bottom:10px;line-height:1.25}
        .fg-training-lead{font-size:0.9em;color:var(--ink-dim);line-height:1.7;font-weight:300;margin-bottom:22px}
        .fg-training-grid{display:flex;flex-direction:column;gap:14px}
        .fg-training-block{background:var(--surface);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;position:relative;overflow:hidden;transition:border-color .22s}
        .fg-training-block:hover{border-color:var(--copper)}
        .fg-training-block-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
        .fg-training-block-icon{font-size:1.1em;color:var(--copper);flex-shrink:0;width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:rgba(198,149,92,0.1);border-radius:8px}
        .fg-training-block-heading{font-family:var(--serif);font-size:1.05em;font-weight:700;color:var(--copper-lt)}
        .fg-training-block-body{font-size:0.86em;color:var(--ink-dim);line-height:1.65;font-weight:300;padding-left:38px}

        /* â”€â”€ Blockquote â”€â”€ */
        .fg-blockquote{margin-bottom:32px;position:relative}
        .fg-blockquote-label{font-family:var(--mono);font-size:0.62em;font-weight:600;color:var(--copper);text-transform:uppercase;letter-spacing:3px;margin-bottom:12px}
        .fg-blockquote-card{background:linear-gradient(135deg,rgba(232,116,59,0.06),rgba(198,149,92,0.08));border:1px solid rgba(198,149,92,0.22);border-radius:var(--radius);padding:28px 28px 28px 32px;position:relative;overflow:hidden}
        .fg-blockquote-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--copper-lt),var(--ember),var(--copper))}
        .fg-blockquote-text{font-family:var(--serif);font-size:1.15em;font-weight:500;font-style:italic;color:var(--ink);line-height:1.55}
        .fg-blockquote-note{font-size:0.82em;color:var(--ink-faint);line-height:1.55;font-weight:300;margin-top:14px;font-style:normal}

        /* â”€â”€ Card Grid â”€â”€ */
        .fg-card-grid-wrap{margin-bottom:32px}
        .fg-card-grid-title{font-family:var(--serif);font-size:1.2em;font-weight:700;color:var(--ink);margin-bottom:6px}
        .fg-card-grid-lead{font-size:0.86em;color:var(--ink-dim);line-height:1.6;font-weight:300;margin-bottom:18px}
        .fg-card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
        .fg-card-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:20px 14px;border-radius:var(--radius-sm);border:1px solid var(--line-2);background:var(--surface-2);text-align:center;transition:border-color .22s}
        .fg-card-item-icon{font-size:1.8em;filter:grayscale(0.3)}
        .fg-card-item-label{font-family:var(--sans);font-size:0.78em;font-weight:600;color:var(--ink-dim);letter-spacing:0.3px}
        .fg-card-grid-connector{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:18px;padding:12px 0}
        .fg-card-grid-connector-line{height:1px;flex:1;background:linear-gradient(90deg,transparent,var(--line),transparent)}
        .fg-card-grid-connector-text{font-family:var(--mono);font-size:0.68em;font-weight:600;color:var(--ember);text-transform:uppercase;letter-spacing:2px;white-space:nowrap}
        .fg-card-grid-footer{font-size:0.88em;color:var(--ink-dim);line-height:1.65;font-weight:300;background:var(--surface);border:1px solid var(--line-2);border-radius:var(--radius-sm);padding:16px 20px}

        /* â”€â”€ Comparison â”€â”€ */
        .fg-comparison{margin-bottom:32px}
        .fg-comparison-title{font-family:var(--serif);font-size:1.2em;font-weight:700;color:var(--ink);margin-bottom:6px}
        .fg-comparison-lead{font-size:0.86em;color:var(--ink-dim);line-height:1.6;font-weight:300;margin-bottom:18px}
        .fg-comparison-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
        .fg-comparison-card{padding:18px 20px;border-radius:var(--radius-sm);position:relative;overflow:hidden}
        .fg-comparison-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
        .fg-comparison-wrong{background:rgba(155,124,139,0.08);border:1px solid rgba(155,124,139,0.22)}
        .fg-comparison-wrong::before{background:var(--mauve)}
        .fg-comparison-right{background:rgba(44,95,90,0.10);border:1px solid rgba(79,168,155,0.22)}
        .fg-comparison-right::before{background:var(--forest-lt)}
        .fg-comparison-label{font-family:var(--mono);font-size:0.6em;font-weight:600;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
        .fg-comparison-wrong .fg-comparison-label{color:var(--mauve-lt)}
        .fg-comparison-right .fg-comparison-label{color:var(--forest-lt)}
        .fg-comparison-text{font-size:0.88em;line-height:1.6;font-weight:400;font-style:italic}
        .fg-comparison-wrong .fg-comparison-text{color:var(--mauve-lt)}
        .fg-comparison-right .fg-comparison-text{color:var(--forest-lt)}
        .fg-comparison-note{font-size:0.86em;color:var(--ink-dim);line-height:1.65;font-weight:300}
        .fg-comparison-neutral{background:var(--surface);border:1px solid var(--line)}
        .fg-comparison-neutral::before{background:var(--copper)}
        .fg-comparison-neutral .fg-comparison-label{color:var(--copper-lt)}
        .fg-comparison-neutral .fg-comparison-text{color:var(--ink-dim);font-style:normal}

        /* â”€â”€ Image Block â”€â”€ */
        .fg-image-block{margin-bottom:32px}
        .fg-image-block-title{font-family:var(--serif);font-size:1.2em;font-weight:700;color:var(--ink);margin-bottom:12px}
        .fg-image-block-frame{width:100%;border-radius:var(--radius);overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,0.4);border:1px solid var(--line-2);margin-bottom:12px}
        .fg-image-block-frame img{width:100%;height:auto;display:block}
        .fg-image-block-caption{font-size:0.84em;color:var(--ink-dim);line-height:1.6;font-weight:300;font-style:italic}

        /* â”€â”€ CTA Options (Day 7) â”€â”€ */
        .fg-cta-options{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
        .fg-cta-primary{display:inline-flex;align-items:center;gap:6px;padding:11px 22px;border-radius:30px;background:linear-gradient(135deg,var(--copper),var(--copper-dk));color:#1a120a;font-family:var(--sans);font-size:0.85em;font-weight:700;text-decoration:none;transition:all .22s;letter-spacing:0.3px}
        .fg-cta-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(198,149,92,0.4)}
        .fg-cta-or{font-size:0.78em;color:var(--ink-faint);font-weight:300;font-style:italic}
        .fg-cta-secondary{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:30px;background:transparent;border:1px solid var(--line);color:var(--ink-dim);font-family:var(--sans);font-size:0.82em;font-weight:600;text-decoration:none;transition:all .22s}
        .fg-cta-secondary:hover{border-color:var(--copper);color:var(--copper-lt);background:rgba(198,149,92,0.08)}

        /* â”€â”€ Mobile â”€â”€ */
        .fg-hamburger{display:none;position:fixed;top:14px;left:14px;z-index:200;width:44px;height:44px;border-radius:12px;background:rgba(13,20,17,0.92);border:1px solid var(--line);backdrop-filter:blur(12px);cursor:pointer;align-items:center;justify-content:center;color:var(--copper);font-size:1.3em}
        .fg-overlay{display:none;position:fixed;inset:0;z-index:15;background:rgba(8,13,11,0.6)}
        @media(max-width:768px){
          .fg-sidebar{position:fixed;left:-280px;top:0;bottom:0;z-index:100;width:270px;min-width:270px;transition:left .3s ease}
          .fg-sidebar.open{left:0}
          .fg-hamburger{display:flex}
          .fg-overlay.open{display:block}
          .fg-main{padding:68px 18px 40px}
          .fg-day-title{font-size:1.8em}
          .fg-confidence-row{gap:5px}
          .fg-conf-btn{width:40px;height:40px;font-size:0.88em;border-radius:10px}
          .fg-mod-row{flex-direction:column;align-items:stretch}
          .fg-select-group{flex-direction:column}
          .fg-card-grid{grid-template-columns:repeat(3,1fr);gap:8px}
          .fg-card-item{padding:14px 8px}
          .fg-card-item-icon{font-size:1.4em}
          .fg-comparison-grid{grid-template-columns:1fr}
          .fg-training-block-body{padding-left:0;margin-top:4px}
          .fg-cta-options{flex-direction:column;align-items:flex-start}
        }
